name: Release

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'bot/refresh-index' &&
      contains(github.event.pull_request.labels.*.name, 'auto-index-refresh')
    runs-on: ubuntu-latest

    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify merged PR scope
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const allowedFiles = new Set([
              'data/index.json',
              'docs/ukadoc',
              'package.json',
              'package-lock.json',
            ]);

            const versionLinePattern = /^[+-]\s+"version":\s+"[^"]+",?$/;

            for (const file of files) {
              core.info(`${file.filename} (${file.status})`);

              if (!allowedFiles.has(file.filename)) {
                core.setFailed(`Unexpected file changed in auto-index-refresh PR: ${file.filename}`);
                return;
              }

              if ((file.filename === 'package.json' || file.filename === 'package-lock.json')) {
                const patch = file.patch ?? '';
                if (!patch.trim()) {
                  core.setFailed(`${file.filename} is missing a textual patch`);
                  return;
                }

                const changedLines = patch
                  .split('\n')
                  .filter(line => /^[+-]/.test(line) && !/^\+\+\+|^---/.test(line));

                if (changedLines.length === 0) {
                  core.setFailed(`${file.filename} has no changed lines`);
                  return;
                }

                for (const line of changedLines) {
                  if (!versionLinePattern.test(line)) {
                    core.setFailed(`${file.filename} changed outside version fields: ${line}`);
                    return;
                  }
                }
              }
            }

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Read package metadata
        id: meta
        run: |
          echo "name=$(npm pkg get name --workspaces=false | tr -d '\"')" >> "$GITHUB_OUTPUT"
          echo "version=$(npm pkg get version --workspaces=false | tr -d '\"')" >> "$GITHUB_OUTPUT"
          echo "tag=v$(npm pkg get version --workspaces=false | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published
        id: npm_state
        env:
          PACKAGE_NAME: ${{ steps.meta.outputs.name }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release state
        id: release_state
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PACKAGE_PUBLISHED: ${{ steps.npm_state.outputs.published }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_exists=false
          release_exists=false
          tag_commit=""

          if git rev-parse "${TAG_NAME}^{commit}" >/dev/null 2>&1; then
            tag_exists=true
            tag_commit="$(git rev-parse "${TAG_NAME}^{commit}")"
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            release_exists=true
          fi

          if [ "$PACKAGE_PUBLISHED" = "true" ]; then
            if [ "$tag_exists" = "true" ] && [ "$release_exists" = "true" ] && [ "$tag_commit" = "$MERGE_COMMIT_SHA" ]; then
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Published npm version is inconsistent with git tag or GitHub release state"
            exit 1
          fi

          if [ "$tag_exists" = "true" ] || [ "$release_exists" = "true" ]; then
            echo "Tag or GitHub release already exists for an unpublished npm version"
            exit 1
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.release_state.outputs.should_publish == 'true'
        run: |
          npm config delete //registry.npmjs.org/:_authToken
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ""

      - name: Create git tag if missing
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
