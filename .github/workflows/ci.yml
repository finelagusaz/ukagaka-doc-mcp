name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate auto-refresh PR scope
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'auto-index-refresh')
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const allowedFiles = new Set([
              'data/index.json',
              'docs/ukadoc',
              'package.json',
              'package-lock.json',
            ]);

            const versionLinePattern = /^[+-]\s+"version":\s+"[^"]+",?$/;

            for (const file of files) {
              core.info(`${file.filename} (${file.status})`);

              if (!allowedFiles.has(file.filename)) {
                core.setFailed(`Unexpected file changed in auto-index-refresh PR: ${file.filename}`);
                return;
              }

              if ((file.filename === 'package.json' || file.filename === 'package-lock.json')) {
                const patch = file.patch ?? '';
                if (!patch.trim()) {
                  core.setFailed(`${file.filename} is missing a textual patch`);
                  return;
                }

                const changedLines = patch
                  .split('\n')
                  .filter(line => /^[+-]/.test(line) && !/^\+\+\+|^---/.test(line));

                if (changedLines.length === 0) {
                  core.setFailed(`${file.filename} has no changed lines`);
                  return;
                }

                for (const line of changedLines) {
                  if (!versionLinePattern.test(line)) {
                    core.setFailed(`${file.filename} changed outside version fields: ${line}`);
                    return;
                  }
                }
              }
            }

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run
